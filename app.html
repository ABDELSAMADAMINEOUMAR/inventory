<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartIMS — Import & Sales Management</title>
  <meta name="description"
    content="Advanced Smart Import and Sales Management System with real-time analytics, inventory tracking, credit management, and multi-language support.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script src="js/api_client.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Cairo:wght@400;600;700;800&display=swap"
    rel="stylesheet">
  <script src="js/chart.min.js"></script>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="css/style.css?v=nexadash_2">
</head>

<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-mark" style="background:transparent;box-shadow:none;">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
          </div>
          <div>
            <div class="logo-name">Smart<span>IMS</span></div>
            <div class="logo-sub" data-i18n="app_subtitle">Import & Sales Pro</div>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="#dashboard" class="nav-item active" data-page="dashboard"
          onclick="UI.navigate('dashboard'); return false;">
          <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg></span>
          <span class="nav-label" id="nav_dashboard" data-i18n="nav_dashboard">Dashboard</span>
        </a>
        <a href="#products" class="nav-item" data-page="products" onclick="UI.navigate('products'); return false;">
          <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg></span>
          <span class="nav-label" id="nav_products" data-i18n="nav_products">Products</span>
        </a>
        <a href="#categories" class="nav-item" data-page="categories"
          onclick="UI.navigate('categories'); return false;">
          <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.586 2.586A2 2 0 0 0 11.172 2H4a2 2 0 0 0-2 2v7.172a2 2 0 0 0 .586 1.414l8.704 8.704a2.426 2.426 0 0 0 3.42 0l6.58-6.58a2.426 2.426 0 0 0 0-3.42z"/><circle cx="7.5" cy="7.5" r=".5" fill="currentColor"/></svg></span>
          <span class="nav-label" id="nav_categories" data-i18n="nav_categories">Categories</span>
        </a>
        <a href="#suppliers" class="nav-item" data-page="suppliers" onclick="UI.navigate('suppliers'); return false;">
          <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
          <span class="nav-label" id="nav_suppliers" data-i18n="nav_suppliers">Suppliers</span>
        </a>
        <a href="#expenses" class="nav-item" data-page="expenses" onclick="UI.navigate('expenses'); return false;">
          <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg></span>
          <span class="nav-label" id="nav_expenses" data-i18n="nav_expenses">Expenses</span>
        </a>
        <a href="#sales" class="nav-item" data-page="sales" onclick="UI.navigate('sales'); return false;">
          <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg></span>
          <span class="nav-label" id="nav_sales" data-i18n="nav_sales">Sales</span>
        </a>
        <a href="#inventory" class="nav-item" data-page="inventory" onclick="UI.navigate('inventory'); return false;">
          <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg></span>
          <span class="nav-label" id="nav_inventory" data-i18n="nav_inventory">Inventory</span>
          <span class="nav-badge" id="stockAlertBadge" style="display:none">0</span>
        </a>
        <a href="#reports" class="nav-item" data-page="reports" onclick="UI.navigate('reports'); return false;">
          <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></span>
          <span class="nav-label" id="nav_reports" data-i18n="nav_reports">Reports</span>
        </a>
        <a href="#users" class="nav-item admin-only" data-page="users" id="navUsersBtn" onclick="UI.navigate('users'); return false;" style="display:none;">
          <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 21a8 8 0 0 0-16 0"/><circle cx="10" cy="8" r="5"/><path d="M22 20c0-3.37-2-6.5-4-8a5 5 0 0 0-.45-8.3"/></svg></span>
          <span class="nav-label" id="nav_users" data-i18n="nav_users">Users</span>
        </a>
        <a href="#platform" class="nav-item platform-only" data-page="platform" id="navPlatformBtn" onclick="UI.navigate('platform'); return false;" style="display:none;">
          <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg></span>
          <span class="nav-label" id="nav_platform" data-i18n="nav_platform">SaaS Platform</span>
          <span class="nav-badge" style="background:#e11d48;color:#fff;font-size:10px;padding:2px 6px;border-radius:4px;">Owner</span>
        </a>
        <a href="#settings" class="nav-item" data-page="settings" onclick="UI.navigate('settings'); return false;">
          <span class="nav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></span>
          <span class="nav-label" id="nav_settings" data-i18n="nav_settings">Settings</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-profile-card">
          <div class="user-avatar" id="userAvatarSidebar">AD</div>
          <div class="user-info">
            <div class="user-name" id="userNameSidebar">Administrator</div>
            <div class="user-role" id="userRoleSidebar" data-i18n="administrator">System Admin</div>
            <div class="user-tenant-badge" id="userTenantSidebar" style="font-size:11px;color:var(--primary);font-weight:600;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">Tenant Company</div>
          </div>
          <button class="logout-icon-btn" onclick="Auth.logout()" title="Logout" aria-label="Logout" data-i18n-title="signout">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
              <polyline points="16 17 21 12 16 7"></polyline>
              <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- Sidebar Overlay for Mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="UI.closeSidebar()"></div>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Top Navigation Header -->
      <header class="top-header">
        <div class="header-left">
          <button class="menu-toggle" onclick="UI.toggleSidebar()" aria-label="Toggle Menu">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div class="header-title-wrap">
            <h1 id="headerTitle">Dashboard</h1>
            <p id="headerSubtitle">Business overview & analytics</p>
          </div>
        </div>

        <div class="header-right">
          <!-- Global Search Box -->
          <div class="search-box">
            <span class="search-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
            <input type="text" id="globalSearch" placeholder="Search products, suppliers, categories..."
              oninput="UI.handleSearch(this.value)" autocomplete="off">
            <div class="search-dropdown" id="searchDropdown" style="display:none"></div>
          </div>

          <!-- Language Toggle -->
          <button class="lang-btn" onclick="I18n.toggle()" id="langToggleBtn" style="display:inline-flex; align-items:center; gap:6px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>عربي
          </button>

          <!-- Quick Mobile Logout Button -->
          <button class="lang-btn" onclick="Auth.logout()" title="Sign Out" style="background:rgba(225,29,72,0.12);color:#f43f5e;border:1px solid rgba(225,29,72,0.3);font-weight:600;display:inline-flex;align-items:center;gap:6px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></line></svg> <span data-i18n="signout">Logout</span>
          </button>

          <!-- Notification Bell -->
          <button class="notif-btn" onclick="UI.showNotifications()" title="Notifications" style="display:inline-flex;align-items:center;justify-content:center;">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="badge notif-badge" id="notifBadge" style="display:none">0</span>
          </button>
        </div>
      </header>

      <!-- Dynamic Page Content -->
      <div class="page-content" id="pageContent">
        <!-- Loader during transitions -->
        <div class="page-loader">
          <div class="spinner"
            style="width:36px;height:36px;border-color:rgba(124,58,237,0.2);border-top-color:var(--primary);"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Premium Confirm Dialog Modal -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal modal-sm confirm-modal-card">
      <div class="confirm-header-wrapper">
        <div class="confirm-icon" id="confirmIcon">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
        </div>
      </div>
      <h3 class="confirm-modal-title" id="confirmTitle">Confirm Action</h3>
      <p class="confirm-modal-body" id="confirmMessage">Are you sure you want to proceed?</p>
      <div class="confirm-modal-footer">
        <button class="btn btn-secondary confirm-cancel-btn" onclick="UI.closeConfirm(false)">Cancel</button>
        <button class="btn btn-danger confirm-action-btn" id="confirmOkBtn" onclick="UI.closeConfirm(true)">Delete</button>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js?v=2"></script>
  <script src="js/products.js"></script>
  <script src="js/categories.js"></script>
  <script src="js/suppliers.js"></script>
  <script src="js/expenses.js"></script>
  <script src="js/sales.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/reports.js"></script>
  <script src="js/users.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
