<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - SmartIMS</title>
  <script src="js/api_client.js"></script>
  <script src="js/db.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(124, 58, 237, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124, 58, 237, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }
    .login-card {
      background: rgba(30, 41, 59, 0.85);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 36px 32px;
      border-radius: 20px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .login-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      color: #fff;
      box-shadow: 0 10px 25px -5px rgba(124, 58, 237, 0.4);
    }
    .login-title {
      font-size: 1.6rem;
      font-weight: 800;
      margin: 0 0 8px 0;
      color: #f8fafc;
    }
    .login-subtitle {
      font-size: 0.9rem;
      color: #94a3b8;
      margin: 0;
      line-height: 1.5;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 6px;
    }
    .input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 16px;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s;
    }
    .input:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.25);
    }
    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 10px 20px -5px rgba(124, 58, 237, 0.4);
    }
    .btn:hover {
      box-shadow: 0 14px 24px -4px rgba(124, 58, 237, 0.5);
    }
    .login-error {
      display: none;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 16px;
      font-size: 0.85rem;
    }
    .login-error.show {
      display: block;
    }
  </style>
</head>
<body class="login-page">
  <div class="grid-bg"></div>

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h1 class="login-title">Create New Password</h1>
        <p class="login-subtitle">Enter your new secure password below to regain access to your account.</p>
      </div>

      <div class="login-error" id="resetError">
        <span id="resetErrorText">Error</span>
      </div>

      <div class="login-success" id="resetSuccess" style="display: none; background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); padding: 12px; border-radius: 10px; margin-bottom: 16px; font-size: 0.9rem; font-weight: 600;">
        ✓ Password reset successfully! Redirecting to login...
      </div>

      <form id="resetForm" onsubmit="handleResetConfirm(event)">
        <div class="form-group" style="margin-bottom: 16px;">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" class="input" placeholder="At least 6 characters" required minlength="6">
        </div>

        <div class="form-group" style="margin-bottom: 20px;">
          <label for="confirmPassword">Confirm New Password</label>
          <input type="password" id="confirmPassword" class="input" placeholder="Re-enter password" required minlength="6">
        </div>

        <button type="submit" class="btn" id="resetBtn">
          Set New Password
        </button>
        
        <div style="text-align: center; margin-top: 16px;">
          <a href="index.html" style="font-size: 0.85rem; color: #8b5cf6; text-decoration: none; font-weight: 600;">← Back to Sign In</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    async function handleResetConfirm(e) {
      e.preventDefault();
      const btn = document.getElementById('resetBtn');
      const err = document.getElementById('resetError');
      const errText = document.getElementById('resetErrorText');
      const successBox = document.getElementById('resetSuccess');
      
      err.classList.remove('show');
      successBox.style.display = 'none';

      const np = document.getElementById('newPassword').value;
      const cp = document.getElementById('confirmPassword').value;

      if (np !== cp) {
        errText.textContent = 'Passwords do not match.';
        err.classList.add('show');
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const uid = params.get('uid');
      const token = params.get('token');
      const emailParam = params.get('email');

      if (!uid || !token) {
        errText.textContent = 'Invalid or missing password reset token in URL.';
        err.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating Password...';

      let serverSuccess = false;
      try {
        if (typeof ApiClient !== 'undefined' && !token.startsWith('demo_token_')) {
          const res = await fetch(`${ApiClient.BASE_URL}auth/password-reset/confirm/`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ uid, token, new_password: np })
          });
          if (res.ok) {
            successBox.style.display = 'block';
            document.getElementById('resetForm').reset();
            setTimeout(() => { window.location.href = 'index.html'; }, 2000);
            serverSuccess = true;
          } else {
            const data = await res.json();
            errText.textContent = data.detail || 'Failed to reset password. Link may be expired.';
            err.classList.add('show');
            btn.disabled = false;
            btn.textContent = 'Set New Password';
            return;
          }
        }
      } catch (ex) {
        serverSuccess = false;
      }

      if (!serverSuccess) {
        // Local Demo / Offline DB update
        if (typeof DB !== 'undefined') {
          const newHash = await DB.hashPassword(np);
          const users = DB.getAll('users');
          let u = users.find(user => (emailParam && user.email && user.email.toLowerCase() === emailParam.toLowerCase()) || user.id == uid) || DB.getById('users', uid);
          if (u) {
            await DB.update('users', u.id, {
              password: np,
              passwordHash: newHash,
              password_hash: newHash,
              is_active: true,
              must_change_password: false
            });
          } else if (emailParam) {
            DB.insert('users', {
              name: emailParam.split('@')[0],
              email: emailParam,
              username: emailParam.split('@')[0],
              password: np,
              passwordHash: newHash,
              role: 'admin',
              is_active: true,
              must_change_password: false
            });
          }
          successBox.style.display = 'block';
          document.getElementById('resetForm').reset();
          setTimeout(() => {
            sessionStorage.clear();
            localStorage.removeItem('sims_user');
            window.location.href = 'index.html';
          }, 1500);
        } else {
          errText.textContent = 'Failed to reset password offline.';
          err.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Set New Password';
        }
      }
    }
  </script>
</body>
</html>
